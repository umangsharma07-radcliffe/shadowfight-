<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cyber Drift Hunter</title>
    <style>
        * { box-sizing: border-box; user-select: none; -webkit-user-select: none; margin: 0; padding: 0; }
        body, html { width: 100%; height: 100%; overflow: hidden; background-color: #05050a; font-family: sans-serif; }
        #gameContainer { position: relative; width: 100%; height: 100%; }
        canvas { display: block; background: #0a0a14; }
        
        /* HUD UI */
        .hud { position: absolute; top: 20px; left: 20px; color: #00f0ff; font-weight: bold; font-size: 20px; text-shadow: 0 0 10px #00f0ff; pointer-events: none; }
        .score-zone { position: absolute; top: 20px; right: 20px; color: #ff007f; font-weight: bold; font-size: 20px; text-shadow: 0 0 10px #ff007f; text-align: right; }

        /* Tablet Steering Buttons */
        .btn-zone { position: absolute; bottom: 40px; width: 100%; display: flex; justify-content: space-between; padding: 0 50px; touch-action: none; }
        .drive-btn { width: 90px; height: 90px; background: rgba(0, 240, 255, 0.1); border: 3px solid #00f0ff; border-radius: 50%; color: #00f0ff; font-weight: bold; font-size: 24px; display: flex; justify-content: center; align-items: center; box-shadow: 0 0 15px rgba(0,240,255,0.4); }
        .drive-btn:active { background: #00f0ff; color: #000; }
    </style>
</head>
<body>

<div id="gameContainer">
    <div class="hud">SPEED: <span id="speedo">0</span> KM/H</div>
    <div class="score-zone">DRIFT SCORE: <span id="scoreBox">0</span></div>
    
    <canvas id="driftCanvas"></canvas>

    <div class="btn-zone">
        <div style="display: flex; gap: 20px;">
            <div id="leftBtn" class="drive-btn">◀</div>
            <div id="rightBtn" class="drive-btn">▶</div>
        </div>
        <div id="gasBtn" class="drive-btn" style="border-color: #ff007f; color: #ff007f; box-shadow: 0 0 15px rgba(255,0,127,0.4);">GAS</div>
    </div>
</div>

<script>
    const canvas = document.getElementById('driftCanvas');
    const ctx = canvas.getContext('2d');

    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.addEventListener('resize', resize);
    resize();

    // Car Physics Object
    let car = {
        x: canvas.width / 2,
        y: canvas.height / 2,
        angle: 0,
        speed: 0,
        maxSpeed: 8,
        accel: 0.15,
        friction: 0.05,
        steerSpeed: 0.06,
        driftFactor: 0.94 // Causes the sliding/drifting effect
    };

    let velocityX = 0, velocityY = 0;
    let inputs = { left: false, right: false, gas: false };
    let skidMarks = [];
    let driftScore = 0;

    // Mobile touch hooks
    document.getElementById('leftBtn').addEventListener('touchstart', (e) => { e.preventDefault(); inputs.left = true; });
    document.getElementById('leftBtn').addEventListener('touchend', () => inputs.left = false);
    document.getElementById('rightBtn').addEventListener('touchstart', (e) => { e.preventDefault(); inputs.right = true; });
    document.getElementById('rightBtn').addEventListener('touchend', () => inputs.right = false);
    document.getElementById('gasBtn').addEventListener('touchstart', (e) => { e.preventDefault(); inputs.gas = true; });
    document.getElementById('gasBtn').addEventListener('touchend', () => inputs.gas = false);

    // Core Loop
    function update() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Render old skid marks
        ctx.strokeStyle = 'rgba(255, 0, 127, 0.15)';
        ctx.lineWidth = 4;
        for (let i = 0; i < skidMarks.length; i++) {
            ctx.beginPath();
            ctx.arc(skidMarks[i].x, skidMarks[i].y, 2, 0, Math.PI*2);
            ctx.stroke();
        }
        if (skidMarks.length > 600) skidMarks.shift();

        // Acceleration physics
        if (inputs.gas) {
            car.speed = Math.min(car.speed + car.accel, car.maxSpeed);
        } else {
            car.speed = Math.max(car.speed - car.friction, 0);
        }

        // Steering logic
        if (car.speed > 1) {
            if (inputs.left) car.angle -= car.steerSpeed;
            if (inputs.right) car.angle += car.steerSpeed;
        }

        // Calculate advanced drift vectors
        let forwardX = Math.cos(car.angle) * car.speed;
        let forwardY = Math.sin(car.angle) * car.speed;

        // Blend current velocity with steering direction to create a "slide"
        velocityX = velocityX * car.driftFactor + forwardX * (1 - car.driftFactor);
        velocityY = velocityY * car.driftFactor + forwardY * (1 - car.driftFactor);

        car.x += velocityX;
        car.y += velocityY;

        // Screen wraps (so you never run out of space)
        if (car.x < -20) car.x = canvas.width + 20;
        if (car.x > canvas.width + 20) car.x = -20;
        if (car.y < -20) car.y = canvas.height + 20;
        if (car.y > canvas.height + 20) car.y = -20;

        // Score tracker if drifting sideways
        let movementAngle = Math.atan2(velocityY, velocityX);
        let angleDiff = Math.abs(car.angle - movementAngle);
        if (angleDiff > 0.3 && car.speed > 3) {
            driftScore += Math.floor(car.speed);
            document.getElementById('scoreBox').innerText = driftScore;
            // Leave neon smoke skid marks behind car
            skidMarks.push({x: car.x, y: car.y});
        }

        document.getElementById('speedo').innerText = Math.floor(car.speed * 22);

        // Draw Player Car as a neon racing wedge
        ctx.save();
        ctx.translate(car.x, car.y);
        ctx.rotate(car.angle);
        ctx.shadowBlur = 15;
        ctx.shadowColor = '#00f0ff';
        ctx.fillStyle = '#00f0ff';
        ctx.beginPath();
        ctx.moveTo(18, 0);
        ctx.lineTo(-12, -10);
        ctx.lineTo(-12, 10);
        ctx.closePath();
        ctx.fill();
        ctx.restore();

        requestAnimationFrame(update);
    }
    update();
</script>
</body>
</html>
