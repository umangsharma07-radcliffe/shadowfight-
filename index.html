<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shadow Fighter 2D</title>
    <style>
        * { box-sizing: border-box; user-select: none; -webkit-user-select: none; margin: 0; padding: 0; }
        body, html { width: 100%; height: 100%; overflow: hidden; background-color: #000; font-family: 'Courier New', Courier, monospace; }
        #gameContainer { position: relative; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }
        canvas { display: block; background: linear-gradient(to top, #2b1f1d, #6e4a41, #9c7265); }
        
        /* Health Bars HUD */
        .hud { position: absolute; top: 20px; width: 90%; display: flex; justify-content: space-between; align-items: center; pointer-events: none; z-index: 10; }
        .health-bar-container { width: 40%; height: 25px; background: #333; border: 2px solid #fff; box-shadow: 0 0 10px rgba(0,0,0,0.5); position: relative; }
        .health-bar { height: 100%; background: #ff3333; width: 100%; transition: width 0.1s ease; }
        #enemyHealth { background: #ffaa00; float: right; }
        .player-name { color: #fff; font-weight: bold; font-size: 18px; text-shadow: 2px 2px #000; margin-bottom: 5px; }

        /* Touch Action Buttons for Tablet */
        .control-zone { position: absolute; bottom: 30px; z-index: 10; touch-action: none; }
        #leftJoystick { left: 40px; width: 120px; height: 120px; background: rgba(0,0,0,0.4); border: 2px solid rgba(255,255,255,0.4); border-radius: 50%; display: flex; justify-content: center; align-items: center; }
        .knob { width: 45px; height: 45px; background: #fff; border-radius: 50%; }
        
        .action-pad { right: 40px; bottom: 35px; display: flex; gap: 20px; }
        .action-btn { width: 85px; height: 85px; background: rgba(0, 0, 0, 0.6); border: 3px solid #fff; border-radius: 50%; color: #fff; font-weight: bold; font-size: 16px; display: flex; justify-content: center; align-items: center; box-shadow: 0 0 10px rgba(0,0,0,0.5); }
        .action-btn:active { background: #fff; color: #000; }

        /* Screens */
        .screen { position: absolute; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: flex; flex-direction: column; justify-content: center; align-items: center; color: #fff; z-index: 20; text-align: center; }
        .hidden { display: none !important; }
        h1 { font-size: 42px; color: #fff; letter-spacing: 4px; margin-bottom: 20px; text-shadow: 0 0 15px rgba(255,255,255,0.6); }
        .btn { padding: 12px 40px; background: #fff; border: none; color: #000; font-size: 18px; font-weight: bold; cursor: pointer; border-radius: 4px; }
    </style>
</head>
<body>

<div id="gameContainer">
    <div class="hud">
        <div style="width: 100%;">
            <div class="player-name">SHADOW (YOU)</div>
            <div class="health-bar-container"><div id="playerHealth" class="health-bar"></div></div>
        </div>
        <div style="color: #fff; font-size: 32px; font-weight: bold; margin: 0 30px; text-shadow: 2px 2px #000;">VS</div>
        <div style="width: 100%; text-align: right;">
            <div class="player-name">TITAN (BOT)</div>
            <div class="health-bar-container"><div id="enemyHealth" class="health-bar" style="width: 100%; float: right;"></div></div>
        </div>
    </div>

    <canvas id="fighterCanvas"></canvas>

    <div id="leftJoystick" class="control-zone"><div id="leftKnob" class="knob"></div></div>
    
    <div class="control-zone action-pad">
        <div id="punchBtn" class="action-btn">PUNCH</div>
        <div id="kickBtn" class="action-btn" style="border-color: #ffaa00;">KICK</div>
    </div>

    <div id="startScreen" class="screen">
        <h1>SHADOW FIGHTER</h1>
        <p style="color: #aaa; margin-bottom: 25px;">Joystick: Move & Jump | Buttons: Attack Combinations</p>
        <button class="btn" onclick="startGame()">FIGHT</button>
    </div>

    <div id="gameOverScreen" class="screen hidden">
        <h1 id="endTitle">VICTORY</h1>
        <button class="btn" onclick="location.reload()">REMATCH</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('fighterCanvas');
    const ctx = canvas.getContext('2d');

    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.addEventListener('resize', resize);
    resize();

    const GROUND_Y = canvas.height - 100;
    let player, enemy, particles;
    let gameState = 'start';

    // Touch Input vector
    let moveX = 0;

    // --- TOUCH CONTROLS INTERFACE ---
    const joystick = document.getElementById('leftJoystick');
    const knob = document.getElementById('leftKnob');
    let joyActive = false, joyStartX = 0, joyStartY = 0;

    joystick.addEventListener('touchstart', (e) => {
        joyActive = true;
        const rect = joystick.getBoundingClientRect();
        joyStartX = rect.left + rect.width / 2;
        joyStartY = rect.top + rect.height / 2;
    });
    window.addEventListener('touchmove', (e) => {
        if (!joyActive) return;
        let touch = e.touches[0];
        let dx = touch.clientX - joyStartX;
        let dy = touch.clientY - joyStartY;
        let dist = Math.min(40, Math.sqrt(dx*dx + dy*dy));
        let angle = Math.atan2(dy, dx);

        knob.style.transform = `translate(${Math.cos(angle)*dist}px, ${Math.sin(angle)*dist}px)`;
        
        // Horizontal Movement
        moveX = Math.cos(angle) * (dist/40);

        // Jump triggers if dragging significantly upward
        if (dy < -25 && player && player.y >= GROUND_Y - player.height) {
            player.vy = -14;
        }
    });
    window.addEventListener('touchend', () => { joyActive = false; knob.style.transform = 'translate(0,0)'; moveX = 0; });

    // Attack Actions Trigger buttons
    document.getElementById('punchBtn').addEventListener('touchstart', (e) => { e.preventDefault(); triggerAttack('punch'); });
    document.getElementById('kickBtn').addEventListener('touchstart', (e) => { e.preventDefault(); triggerAttack('kick'); });

    function triggerAttack(type) {
        if (gameState !== 'playing' || player.state !== 'idle') return;
        player.state = type;
        player.frame = 0;
    }

    // --- FIGHTER ENTITY CLASS ---
    class Fighter {
        constructor(x, isBot) {
            this.x = x;
            this.y = GROUND_Y - 130;
            this.width = 50;
            this.height = 130;
            this.isBot = isBot;
            this.hp = 100;
            this.vx = 0; this.vy = 0;
            this.state = 'idle'; // idle, punch, kick, hit
            this.frame = 0;
            this.direction = isBot ? -1 : 1; // Face each other
        }
        draw() {
            ctx.save();
            // True Shadow Fight pure-black silhouette styling
            ctx.fillStyle = '#0a0a0a';
            ctx.shadowBlur = 4;
            ctx.shadowColor = '#000';

            // Main body core box
            ctx.fillRect(this.x, this.y, this.width, this.height);
            
            // Head sphere
            ctx.beginPath();
            ctx.arc(this.x + this.width/2, this.y - 20, 18, 0, Math.PI*2);
            ctx.fill();

            // Attack state body rendering adjustments
            if (this.state === 'punch') {
                ctx.fillRect(this.x + (this.direction === 1 ? this.width : -45), this.y + 25, 45, 12); // Extends arm
            } else if (this.state === 'kick') {
                ctx.fillRect(this.x + (this.direction === 1 ? this.width : -50), this.y + 70, 50, 15); // Extends leg
            } else if (this.state === 'hit') {
                this.x += this.direction === 1 ? -1.5 : 1.5; // Slight knockback stance tilt
            }
            ctx.restore();
        }
        update() {
            // Apply simple platformer gravity physics
            this.y += this.vy;
            if (this.y < GROUND_Y - this.height) {
                this.vy += 0.6; // Gravity drop speed
            } else {
                this.y = GROUND_Y - this.height;
                this.vy = 0;
            }

            // Movement rules logic
            if (!this.isBot) {
                if (this.state === 'idle') this.x += moveX * 5;
            } else {
                // Enemy AI Bot Core Behavior
                this.aiBrain();
            }

            // Lock boundaries inside screen borders
            if (this.x < 0) this.x = 0;
            if (this.x > canvas.width - this.width) this.x = canvas.width - this.width;

            // Attack frame timers animation loops resets
            if (this.state !== 'idle') {
                this.frame++;
                if (this.frame > 20) { // Action duration timing length
                    if (this.state === 'punch' || this.state === 'kick') this.checkHit();
                    this.state = 'idle';
                }
            }
        }
        aiBrain() {
            if (this.state !== 'idle') return;
            let distanceToPlayer = Math.abs((player.x + player.width/2) - (this.x + this.width/2));
            
            // Auto track face side
            this.direction = (player.x > this.x) ? 1 : -1;

            if (distanceToPlayer > 80) {
                // Stalk/Walk toward player position closer
                this.x += this.direction * 2.2;
            } else {
                // Action Strike chance trigger loops random attack
                if (Math.random() > 0.94) {
                    this.state = Math.random() > 0.5 ? 'punch' : 'kick';
                    this.frame = 0;
                }
            }
        }
        checkHit() {
            let hitboxRange = this.state === 'punch' ? 55 : 65;
            let reachX = this.direction === 1 ? this.x + this.width : this.x - hitboxRange;
            let target = this.isBot ? player : enemy;

            // Hit collision overlap logic boundaries
            if (reachX + hitboxRange >= target.x && reachX <= target.x + target.width &&
                this.y + 20 <= target.y + target.height && this.y + 90 >= target.y) {
                
                target.hp -= this.state === 'punch' ? 8 : 12;
                target.state = 'hit';
                target.frame = 0;
                createImpactSpark(target.x + target.width/2, target.y + 40);
                updateHUD();

                // Finish match trigger check logic rule
                if (target.hp <= 0) {
                    gameState = 'gameover';
                    document.getElementById('endTitle').innerText = this.isBot ? "SHADOW WINS" : "TITAN WINS";
                    document.getElementById('gameOverScreen').classList.remove('hidden');
                }
            }
        }
    }

    function createImpactSpark(x, y) {
        for(let i=0; i<8; i++) {
            particles.push({
                x: x, y: y,
                vx: (Math.random() - 0.5) * 8,
                vy: (Math.random() - 0.5) * 8,
                alpha: 1
            });
        }
    }

    function updateHUD() {
        document.getElementById('playerHealth').style.width = Math.max(0, player.hp) + '%';
        document.getElementById('enemyHealth').style.width = Math.max(0, enemy.hp) + '%';
    }

    function startGame() {
        document.getElementById('startScreen').classList.add('hidden');
        player = new Fighter(150, false);
        enemy = new Fighter(canvas.width - 200 - 50, true);
        particles = [];
        gameState = 'playing';
    }

    // --- CORE GAME ENGINE LOOP ---
    function run() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Draw Ambient Environment Graphic Scenery
        ctx.fillStyle = '#1c1412';
        ctx.fillRect(0, GROUND_Y, canvas.width, 100); // Ground Floor platform

        if (gameState === 'playing') {
            player.update();
            enemy.update();
            
            // Real-time automatic dynamic face turn angle adjustments
            player.direction = (enemy.x > player.x) ? 1 : -1;

            player.draw();
            enemy.draw();

            // Particle sparks drawing engine cycle loops runs
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx; p.y += p.vy; p.alpha -= 0.04;
                ctx.save();
                ctx.globalAlpha = p.alpha;
                ctx.fillStyle = '#fff';
                ctx.fillRect(p.x, p.y, 4, 4);
                ctx.restore();
                if (p.alpha <= 0) particles.splice(i, 1);
            }
        }
        requestAnimationFrame(run);
    }
    run();
</script>
</body>
</html>
